name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Check, Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Normalize formatting in place so later steps build clean code.
      # (Run `cargo fmt --all` locally before committing to keep the
      #  repo itself formatted.)
      - name: Format
        run: cargo fmt --all

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace

  release:
    name: Release (${{ matrix.target }})
    if: github.event_name == 'release'
    needs: ci
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: mew
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            bin: mew
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: mew
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: mew.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p mew-cli

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          tar -czf "mew-${{ matrix.target }}.tar.gz" "${{ matrix.bin }}"
          mv "mew-${{ matrix.target }}.tar.gz" "$GITHUB_WORKSPACE/"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          7z a "mew-${{ matrix.target }}.zip" "${{ matrix.bin }}"
          mv "mew-${{ matrix.target }}.zip" "$GITHUB_WORKSPACE/"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: mew-${{ matrix.target }}.${{ matrix.archive }}

  termux:
    name: Release (termux / aarch64-linux-android)
    if: github.event_name == 'release'
    needs: ci
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release (termux)
        run: cargo ndk --target aarch64-linux-android --platform 24 -p mew-cli -- build --release

      - name: Package
        shell: bash
        run: |
          cd "target/aarch64-linux-android/release"
          tar -czf "mew-termux-aarch64.tar.gz" mew
          mv "mew-termux-aarch64.tar.gz" "$GITHUB_WORKSPACE/"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: mew-termux-aarch64.tar.gz
